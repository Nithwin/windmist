name: Feature Request
description: Suggest an idea, enhancement, or new capability for WindMist
title: "[FEAT]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make WindMist better!
        Please search [existing issues](https://github.com/Nithwin/windmist/issues) to ensure this feature hasn't already been requested or planned.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of the friction or pain point you are trying to solve.
      placeholder: e.g., I'm always frustrated when WindMist does not support...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen and how the feature should behave.
      placeholder: e.g., I would like a command flag `--format=json` that outputs...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions, workarounds, or other CLI tools you have considered.
      placeholder: e.g., Currently I use a bash pipe with `jq` to...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, terminal UI sketches, or references to other projects here.
    validations:
      required: false
